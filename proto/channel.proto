syntax = "proto3";

package opentalon.channel.v1;

option go_package = "github.com/opentalon/opentalon/pkg/channel/channelpb";

import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

service ChannelService {
  rpc Capabilities(google.protobuf.Empty) returns (ChannelCapabilities);
  rpc Configure(ConfigureRequest) returns (ConfigureResponse);
  rpc Tools(google.protobuf.Empty) returns (ToolsResponse);
  rpc Start(google.protobuf.Empty) returns (stream InboundMessage);
  rpc Send(OutboundMessage) returns (SendResponse);
}

message ConfigureRequest {
  google.protobuf.Struct config = 1;
}

message ConfigureResponse {}

message ToolsResponse {
  repeated ToolDefinition tools = 1;
}

message ToolDefinition {
  string plugin = 1;
  string description = 2;
  string action = 3;
  string action_description = 4;
  string method = 5;
  string url = 6;
  string body = 7;
  map<string, string> headers = 8;
  repeated string required_env = 9;
  repeated ToolParam parameters = 10;
}

message ToolParam {
  string name = 1;
  string description = 2;
  bool required = 3;
}

message SendResponse {}

message InboundMessage {
  string channel_id = 1;
  string conversation_id = 2;
  string thread_id = 3;
  string sender_id = 4;
  string sender_name = 5;
  string content = 6;
  repeated FileAttachment files = 7;
  map<string, string> metadata = 8;
  google.protobuf.Timestamp timestamp = 9;
}

message OutboundMessage {
  string conversation_id = 1;
  string thread_id = 2;
  string content = 3;
  repeated FileAttachment files = 4;
  map<string, string> metadata = 5;
}

message FileAttachment {
  string name = 1;
  string mime_type = 2;
  bytes data = 3;
  int64 size = 4;
}

message ChannelCapabilities {
  string id = 1;
  string name = 2;
  bool threads = 3;
  bool files = 4;
  bool reactions = 5;
  bool edits = 6;
  int64 max_message_length = 7;
  string response_format = 8;
  string response_format_prompt = 9;
}
