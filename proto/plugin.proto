syntax = "proto3";

package opentalon.plugin.v1;

import "google/protobuf/empty.proto";

option go_package = "github.com/opentalon/opentalon/proto/pluginpb";

service PluginService {
  // Init delivers host configuration to the plugin before any other calls.
  rpc Init(PluginInitRequest) returns (google.protobuf.Empty);
  rpc Execute(ToolCallRequest) returns (ToolResultResponse);
  rpc Capabilities(google.protobuf.Empty) returns (PluginCapabilities);

  // ExecuteBidi is the bidirectional-streaming variant of Execute. The
  // host opens the stream and sends a single HostMessage{call} to start
  // the action; the plugin may then send zero or more
  // PluginMessage{callback_request} messages mid-execution to invoke
  // other tools/actions through the host's orchestrator (= the expert
  // system: same policy, observability, credential injection, and
  // usage tracking as an LLM-initiated call). The host replies to each
  // callback with HostMessage{callback_response}. The plugin ends the
  // stream by sending PluginMessage{result}.
  //
  // Only plugins that declare PluginCapabilities.supports_callbacks =
  // true may receive ExecuteBidi traffic; the host calls Execute (unary)
  // for everyone else, so existing plugins keep working unchanged.
  rpc ExecuteBidi(stream HostMessage) returns (stream PluginMessage);
}

// HostMessage is one frame on the host → plugin direction of an
// ExecuteBidi stream. The first frame is always {call}; subsequent
// frames are {callback_response}, each correlated by id to a prior
// PluginMessage{callback_request}.
message HostMessage {
  oneof payload {
    ToolCallRequest call = 1;
    CallbackResponse callback_response = 2;
  }
}

// PluginMessage is one frame on the plugin → host direction of an
// ExecuteBidi stream. Frames are zero or more {callback_request}
// (each requesting a host-side RunAction) followed by exactly one
// terminal {result}; sending {result} closes the plugin's send half.
message PluginMessage {
  oneof payload {
    CallbackRequest callback_request = 1;
    ToolResultResponse result = 2;
  }
}

// CallbackRequest asks the host to invoke another tool/action via its
// normal executeCall path. The host's profile/actor context for the
// dispatched call is inherited from the surrounding ToolCallRequest's
// context — no identity fields needed on the wire, because the host
// already knows who is talking to this plugin process.
message CallbackRequest {
  // id correlates with the CallbackResponse the host returns. Plugins
  // may have multiple callbacks outstanding (host responses are not
  // guaranteed to arrive in request order); the id keeps them matched.
  string id = 1;
  string plugin = 2;
  string action = 3;
  map<string, string> args = 4;
}

// CallbackResponse is the host's reply to one CallbackRequest. id
// matches the request's id. Either content or error is set.
message CallbackResponse {
  string id = 1;
  string content = 2;
  string error = 3;
  string structured_content = 4;
}

message PluginInitRequest {
  string config_json = 1;
}

message ToolCallRequest {
  string id = 1;
  string plugin = 2;
  string action = 3;
  map<string, string> args = 4;
  reserved 5; // was: map<string, string> credentials (replaced by credential_headers)
  // Per-request credential headers from the verified profile, keyed by MCP server name.
  // Each entry specifies an HTTP header name and value to inject when calling that server.
  // Example: {"myapp": {header: "X-App-User", value: "123"}}.
  // The plugin merges these with its static configured headers; credential headers take priority.
  map<string, CredentialHeader> credential_headers = 6;
}

// CredentialHeader is a per-MCP-server credential specifying an HTTP header
// name and value to inject into requests to that server.
message CredentialHeader {
  string header = 1; // HTTP header name (e.g. "X-App-User", "Authorization")
  string value = 2;  // header value (e.g. "user-123", "Bearer tok")
}

message ToolResultResponse {
  string call_id = 1;
  string content = 2;
  string error = 3;
  // Optional structured payload from the underlying tool. Mirrors the
  // `structuredContent` field defined by the MCP spec (revision 2025-06+):
  // when a tool emits both a human-readable text block (`content`) and a
  // schema-validated JSON record, the latter goes here so the host can
  // render or forward it as a separate channel without relying on string
  // delimiters embedded in `content`. JSON-encoded; empty when omitted.
  string structured_content = 4;
}

message PluginCapabilities {
  string name = 1;
  string description = 2;
  repeated Action actions = 3;
  // Optional text injected into the LLM system prompt when this plugin is loaded.
  // Use it to surface context the LLM should know about (e.g. API base URLs, capability notes).
  //
  // Security: plugins are currently trusted subprocesses (operator-installed, same host).
  // If plugin trust is ever relaxed (e.g. third-party marketplace), this field becomes a
  // prompt-injection vector and must be sanitised or sandboxed before inclusion.
  string system_prompt_addition = 4;
  // Optional glossary entries provided by the plugin (e.g. from an MCP server).
  // The orchestrator collects entries from all plugins and syncs them to the
  // vector store via the sync_glossary action for automatic context injection.
  repeated GlossaryEntry glossary = 5;
  // Optional per-section knowledge articles provided by the plugin (e.g. an
  // MCP server's `initialize._meta.knowledge_articles`). Each entry becomes
  // one KnowledgeArticles record on the vector store with source
  // "mcp-knowledge:<plugin>:<id>" so the prepare-path RAG can pull just
  // the relevant section into [knowledge_context], instead of having the
  // whole prose go into every system prompt via system_prompt_addition.
  repeated KnowledgeArticle knowledge_articles = 6;

  // SupportsCallbacks declares that this plugin needs the host to
  // dispatch its actions over ExecuteBidi (bidirectional streaming)
  // rather than the unary Execute, so it can fire CallbackRequest
  // messages mid-execution to invoke other tools/actions through the
  // host's orchestrator. Plugins that don't need that capability leave
  // this false (the default) and continue to receive unary Execute
  // traffic — no behaviour change for existing plugins.
  bool supports_callbacks = 7;
}

message GlossaryEntry {
  string term = 1;
  string definition = 2;
  string category = 3;          // optional grouping (e.g. "hr", "support")
  repeated string tags = 4;     // optional free-form tags
  repeated string synonyms = 5; // alternative terms for better vector matching
}

// KnowledgeArticle is one self-contained reference section a plugin
// contributes for retrieval-time injection (as opposed to always-on
// inclusion via system_prompt_addition). Required fields: id, title, content.
message KnowledgeArticle {
  string id = 1;
  string title = 2;
  string content = 3;
  repeated string tags = 4; // optional free-form tags merged with the auto-set ["opentalon", "mcp", "knowledge", <plugin>] on storage
}

message Action {
  string name = 1;
  string description = 2;
  repeated Parameter parameters = 3;
  bool user_only = 4; // if true, hidden from LLM and blocked from LLM-sourced calls; only invocable directly by the user
  repeated string inject_context_args = 5; // context arg names (e.g. "actor_id") the host injects from request context before calling Execute
  // RFC #249 Phase 4 tool-tier flag: if true, the orchestrator pins this
  // action into Tier 0 (always present in the LLM's `tools` array, full
  // schema). RAG-derived scores still feed into the per-turn ranking for
  // event diagnostics, but never demote an always_include action below
  // Tier 0. Use for capabilities a plugin considers non-negotiable for
  // its domain (e.g. an emergency-stop or session-reset action).
  bool always_include = 6;
  // If true, the action is a pure query — it does not mutate any state
  // the user cares about. The orchestrator's per-tool-call confirmation
  // gate short-circuits when this is set: read_only=true actions execute
  // without prompting the user "I'm about to execute X, proceed?",
  // which would otherwise be noise and burn an LLM round-trip for a
  // narration that the user never needed to see. Default false — every
  // action is treated as a potential write until the plugin declares
  // otherwise. Plugins that aggregate upstream tools (e.g. the
  // mcp-plugin) typically propagate this from the upstream protocol's
  // own read-only hint (MCP: `annotations.readOnlyHint`).
  bool read_only = 7;
}

message Parameter {
  string name = 1;
  string description = 2;
  string type = 3;
  bool required = 4;
}
