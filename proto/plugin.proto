syntax = "proto3";

package opentalon.plugin.v1;

import "google/protobuf/empty.proto";

option go_package = "github.com/opentalon/opentalon/proto/pluginpb";

service PluginService {
  // Init delivers host configuration to the plugin before any other calls.
  rpc Init(PluginInitRequest) returns (google.protobuf.Empty);
  rpc Execute(ToolCallRequest) returns (ToolResultResponse);
  rpc Capabilities(google.protobuf.Empty) returns (PluginCapabilities);
}

message PluginInitRequest {
  string config_json = 1;
}

message ToolCallRequest {
  string id = 1;
  string plugin = 2;
  string action = 3;
  map<string, string> args = 4;
}

message ToolResultResponse {
  string call_id = 1;
  string content = 2;
  string error = 3;
}

message PluginCapabilities {
  string name = 1;
  string description = 2;
  repeated Action actions = 3;
}

message Action {
  string name = 1;
  string description = 2;
  repeated Parameter parameters = 3;
  bool user_only = 4; // if true, hidden from LLM and blocked from LLM-sourced calls; only invocable directly by the user
}

message Parameter {
  string name = 1;
  string description = 2;
  string type = 3;
  bool required = 4;
}
