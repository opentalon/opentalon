# Copy to config.yaml (or ~/.opentalon/config.yaml) and set your API key.
# config.yaml is gitignored so you don't commit secrets.

models:
  providers:
    # DeepSeek — OpenAI-compatible API (free tier available)
    deepseek:
      base_url: "https://api.deepseek.com/v1"
      api_key: "${DEEPSEEK_API_KEY}"
      api: openai-completions
      models:
        - id: deepseek-chat
          name: DeepSeek Chat
          input: [text]
          context_window: 128000
          cost:
            input: 0.14
            output: 0.28
        - id: deepseek-reasoner
          name: DeepSeek Reasoner
          reasoning: true
          input: [text]
          context_window: 128000
          cost:
            input: 0.55
            output: 2.19

  catalog:
    deepseek/deepseek-chat:
      alias: deepseek
      weight: 80
    deepseek/deepseek-reasoner:
      alias: deepseek-r
      weight: 20

routing:
  primary: deepseek/deepseek-chat
  # When fallbacks is non-empty, core prefers `primary` while its endpoint is
  # reachable and automatically switches to the fallbacks (in order) otherwise.
  # It trips to a fallback immediately on a failed health probe or a live request
  # error, and only switches back after `health.recover_after` consecutive healthy
  # probes (hysteresis — avoids flapping when the primary is intermittently up).
  fallbacks:
    - deepseek/deepseek-reasoner
  # health:                    # optional; tunes the health-gated fallback above
  #   path: "/models"          # probe path relative to the primary's base_url (default "/models")
  #   interval: "10s"          # how often to probe the primary (default "10s")
  #   timeout: "3s"            # per-probe timeout (default "3s")
  #   recover_after: 3         # consecutive healthy probes before switching back (default 3)

# --- Example: self-hosted (dedicated) primary + public (shared) fallback -------
# A self-hosted vLLM endpoint (flat hourly cost -> set token cost to 0) preferred
# over a metered public endpoint, with automatic health-gated failover. Give each
# endpoint its OWN model id so usage is recorded against the right cost.
#
# models:
#   providers:
#     vllm-dedicated:                       # self-hosted vLLM (OpenAI-compatible)
#       base_url: "${VLLM_DEDICATED_URL}"   # e.g. https://<app-id>.app.gra.ai.cloud.ovh.net/v1
#       api_key: "${VLLM_DEDICATED_KEY}"
#       api: openai-completions
#       models:
#         - id: gpt-oss-120b
#           name: GPT OSS 120B (self-hosted)
#           reasoning: true
#           context_window: 32768
#           cost: { input: 0, output: 0 }   # flat hourly billing, not per token
#     ovh-shared:                           # public OVH AI endpoint (metered)
#       base_url: "${OVH_AI_URL}"
#       api_key: "${OVH_AI_KEY}"
#       api: openai-completions
#       models:
#         - id: gpt-oss-120b-ovh
#           name: GPT OSS 120B (OVH shared)
#           reasoning: true
#           context_window: 32768
#           cost: { input: 0.0, output: 0.0 }
# routing:
#   primary: vllm-dedicated/gpt-oss-120b
#   fallbacks:
#     - ovh-shared/gpt-oss-120b-ovh

orchestrator:
  rules: []
  # Override any built-in prompt. Key = canonical name (the .txt filename under
  # internal/prompts/ without the extension); omit a key to keep its embedded
  # default; set an empty value to blank that block entirely. Plugin/MCP server
  # instructions are still appended to the system prompt regardless.
  # Valid keys: orchestrator_preamble, orchestrator_preamble_native,
  # orchestrator_subprocess, subprocess_preamble, planner_preamble,
  # planner_suffix, planner_narrate, planner_narrate_tool,
  # orchestrator_summarize, orchestrator_summarize_update,
  # orchestrator_session_title, rules_default, rules_scheduling,
  # format_slack, format_markdown, format_html, format_telegram, format_teams,
  # format_whatsapp, format_discord, format_text
  # prompt_overrides:
  #   orchestrator_preamble_native: |
  #     You are a focused assistant for ACME. Call tools to act; never guess.
  #   rules_scheduling: ""   # remove the scheduler rules where no scheduler plugin is loaded
  # permission_plugin: permission   # optional; core calls this plugin with action "check"(actor, plugin) before running a tool
  # debounce_window: "800ms"       # merge rapid messages into one LLM call (default "0" = disabled)
  # Run these plugin actions before the first LLM call; their output becomes the user message (or they can block with send_to_llm: false).
  # List order = execution order: the first entry runs first and receives the user message; each preparer's output is the next one's input.
  content_preparers:
    # Slash commands (/install skill, /show config, /commands, /set prompt, /clear) — run first
    - plugin: opentalon-commands
      action: prepare
      arg_key: text
    - plugin: hello-world
      action: prepare
      arg_key: text
  # Run these plugin actions after the LLM response to transform the output before
  # it reaches the channel. Useful for fixing formatting when cheap models ignore
  # system prompt hints (e.g. outputting Markdown ** bold ** in a Slack channel).
  # List order = execution order; each formatter's output is the next one's input.
  # Formatters receive two args: "text" (the response) and "response_format" (e.g. "slack").
  # response_formatters:
  #   - plugin: "lua:format-response"    # built-in Lua formatter (see scripts/format-response.lua)
  #     fail_open: true                  # default true; log and skip on failure (never blocks responses)
  #   # Or use a gRPC plugin:
  #   # - plugin: my-formatter
  #   #   action: format
  #   #   fail_open: true
  # Pipeline execution: LLM-planned multi-step workflows with confirmation and retry.
  # When enabled, the planner decomposes multi-step requests into a DAG of plugin actions,
  # asks the user for confirmation, and executes with per-step retry and timeout.
  # pipeline:
  #   enabled: true
  #   max_step_retries: 3    # retries per step before giving up (default 3)
  #   step_timeout: "60s"    # per-step timeout as Go duration (default "60s")
  #   plan_timeout: "15s"    # max time for planner LLM call (default "15s"); increase for slower models
  # Talon workflows & EITL rules are provided by the talon-plugin
  # (https://github.com/opentalon/talon-plugin). Install it like any other
  # plugin; no orchestrator config knob is needed.
  # Knowledge-augmented RAG: sync plugin actions to vector store on startup and
  # optionally ingest markdown files from a directory. Articles can also arrive
  # via the weaviate plugin's HTTP API (POST /api/v1/articles). Knowledge is
  # pull-only: the model discovers articles from the system-prompt catalog and
  # fetches bodies on demand via ask_knowledge (no per-turn auto-injection).
  # The sync_actions payload also carries each plugin's SystemPromptAddition
  # (e.g. an MCP server's `initialize.instructions` text bridged through by
  # mcp-plugin) as `server_instructions`, so the vector store can index it for
  # semantic retrieval alongside per-action descriptions. Each call also ships
  # `keep_plugins` (the authoritative live-plugin list) so the sync plugin can
  # delete records for plugins removed since last startup. Older sync-plugin
  # versions ignore both fields — upserts continue to work.
  # knowledge:
  #   sync_plugin: weaviate              # plugin that has sync_actions action
  #   sync_action: sync_actions          # action name for capability sync
  #   plugin: weaviate                   # plugin for knowledge article ingestion
  #   action: ingest                     # action name for single-article ingestion
  #   dir: ./knowledge                   # optional: scan .md files at startup
  #   refresh_interval: 15m              # periodically re-fetch upstream capabilities + re-sync ("0" = disabled)
  # Preparer-phase behaviour: runaway-tool-failure protections. Both fields
  # are opt-in — omit them (or set <= 0) to disable each protection.
  # preparer:
  #   tool_error_handling:
  #     loop_cap_per_turn: 2                 # consecutive identical-tool errors per turn before the "tool X failed N times" nudge; <= 0 disables
  #     sticky_demotion_threshold: 3         # consecutive session-level errors before known_tools demotion (self-healed on success); <= 0 disables
  # Post-failure tool-call repair: when a tool call fails the core's own
  # pre-dispatch argument validation (unknown argument names — the tool
  # provably never ran), a one-shot corrector LLM side-call repairs the SHAPE
  # of the call — rename/restructure only, a mechanical guard rejects any
  # changed value — and re-executes it under the SAME user approval instead
  # of asking again. Calls that would need a confirmation nobody granted are
  # never repaired. Recommended pairing: run sessions on a fast, cheap model
  # and set `model` to a stronger tier that fires only on failures and sees a
  # tiny focused prompt.
  # repair:
  #   enabled: true
  #   model: ""              # corrector model id; empty = deployment default model.
  #                          # Must be a bare model id served by the same (primary)
  #                          # provider as the session model — NOT the "provider/model"
  #                          # routing form. Ids missing from the models list are
  #                          # warned about at startup.
  #   max_attempts: 2        # corrector + re-execution rounds per failed call (default 2)
  #   timeout: "10s"         # per corrector call (default "10s")
  #   # prompt: |            # optional override of the built-in corrector instructions;
  #   #   ...                # must keep the {"repaired_args": ...} / {"abort": ...} JSON contract

channels:
  console:
    enabled: true
    # cache: false    # when true, reuse cached binary from channels.lock (default false = always rebuild)
    # Local binary (after running: make setup), or grpc://host:port for remote
    plugin: "./channels/console-channel/console"
    # Or use GitHub refs — core auto-fetches, builds, and pins in channels.lock:
    # github: "opentalon/console-channel"
    # ref: "master"
    config: {}

  # Synchronous HTTP request/response channel — POST a message with a profile
  # token (same auth model as websocket-channel) and get the LLM's reply in the
  # HTTP response body. Useful for curl, server-side cron, and backend services
  # that prefer REST over a streaming socket. See: opentalon/http-channel.
  # http:
  #   enabled: true
  #   github: "opentalon/http-channel"
  #   ref: "master"
  #   config:
  #     addr: "0.0.0.0:9100"   # host:port to listen on
  #     path: "/chat"           # endpoint path (set "/" when an ingress strips the prefix upstream)
  #     timeout: "120s"         # max wait per request for the LLM response
  #     cors_origins:           # omit to allow all (dev only)
  #       - "https://mysite.com"

  # YAML-driven channels (no compiled binary — run in-process from channel.yaml spec)
  # slack:
  #   enabled: true
  #   plugin: "./channels/slack-channel/channel.yaml"
  #   config:
  #     ack_reaction: eyes
  #     done_reaction: white_check_mark

  # telegram:
  #   enabled: true
  #   plugin: "./channels/telegram-channel/channel.yaml"
  #   config: {}

  # --- Inbound media handling ---
  #
  # YAML channels support non-text messages (photos, voice, stickers, documents, etc.)
  # via an `inbound.media` section in the channel's channel.yaml file.
  #
  # Each rule has three fields:
  #   when:        event field whose presence triggers this rule (e.g. "photo", "voice")
  #   description: text injected as message content — LLM sees this and responds naturally
  #   resolve:     (optional) HTTP steps to download binary for LLM-supported types (images, PDFs)
  #
  # For LLM-supported types (images, PDFs): resolve downloads binary, attaches it as a file,
  # and the LLM processes it natively via vision/document understanding.
  # For unsupported types (voice, video, stickers): no resolve — the description tells the LLM
  # what was sent, and it responds naturally. No hardcoded error messages.
  #
  # resolve steps run sequentially:
  #   - Intermediate steps (with `store:`) parse JSON response and store fields
  #   - The final step (without `store:`) captures raw binary
  #   - Templates: {{event.*}}, {{env.*}}, {{resolve.*}}, {{self.*}}
  #
  # Content mapping supports fallback: `content: { field: "text", fallback: "caption" }`
  #
  # Working examples: channels/telegram-channel/channel.yaml, channels/slack-channel/channel.yaml
  # NOTE: Outbound media (sending images/documents back) is planned for the next release.

plugins:
  # Slash commands: /install skill, /show config, /commands, /set prompt, /clear
  opentalon-commands:
    enabled: true
    # cache: false    # when true, reuse cached binary from plugins.lock (default false = always rebuild)
    insecure: false   # required: allows preparer to return invoke for opentalon actions
    github: "opentalon/opentalon-commands"
    ref: "master"
    config: {}

  hello-world:
    enabled: true
    # insecure: false  # set to false to allow this preparer to run invoke steps; default is true (cannot invoke)
    # Local binary (after running: make setup), or grpc://host:port for remote
    plugin: "./plugins/hellow-world-plugin/hello-world-plugin"
    # Or use GitHub refs — core auto-fetches, builds, and pins in plugins.lock:
    # github: "opentalon/hellow-world-plugin"
    # ref: "master"
    config: {}

  # MCP bridge: connects to MCP-compatible tool servers.
  # Config block is passed to the plugin via the Init RPC.
  # mcp:
  #   enabled: true
  #   github: "opentalon/mcp-plugin"
  #   ref: "master"
  #   config:
  #     servers:
  #       - name: my-mcp-server
  #         url: "https://mcp.example.com/sse"
  #         headers:
  #           Authorization: "Bearer {{env.MCP_TOKEN}}"

# Request packages: skill-style API calls (no compiled plugin). Core runs HTTP requests from templates.
# Use {{env.VAR}} and {{args.param}} in url/body/headers. Guardrails: required_env validated before request.
# To reuse OpenClaw/ClawHub skills you can:
#   - skills_path: local dir of skill subdirs (each subdir: SKILL.md or request.yaml)
#   - skills: list of skill names; core downloads them by name (clone only, no build). Use default repo
#     or per-skill github/ref. One repo can host many skills (monorepo): set default_skill_github and
#     default_skill_ref; each list entry is the subdir name (e.g. jira-create-issue).
# request_packages:
#   path: ./request-pkgs   # optional: load .yaml files (each file = one plugin set)
#   skills_path: ./skills  # optional: local OpenClaw-style skills (each subdir: SKILL.md or request.yaml)
#   default_skill_github: openclaw/skills   # default repo when using skills: [name, ...]
#   default_skill_ref: main
#   skills: [jira-create-issue, slack-send] # download these by name (from default repo or per-skill github/ref)
#   # Or per-skill repo (object form):
#   # skills:
#   #   - name: jira-create-issue
#   #     github: openclaw/skill-jira
#   #     ref: main
#   inline:
#     - plugin: jira
#       description: Create and manage Jira issues
#       packages:
#         - action: create_issue
#           description: Create a Jira issue in a project
#           method: POST
#           url: "{{env.JIRA_URL}}/rest/api/3/issue"
#           body: '{"fields":{"project":{"key":"{{args.project}}"},"summary":"{{args.summary}}","description":"{{args.description}}","issuetype":{"name":"Task"}}}'
#           headers:
#             Authorization: "Bearer {{env.JIRA_API_TOKEN}}"
#           required_env: [JIRA_URL, JIRA_API_TOKEN]
#           parameters:
#             - name: project
#               description: Project key (e.g. OPS)
#               required: true
#             - name: summary
#               description: Issue summary
#               required: true
#             - name: description
#               description: Issue description
#               required: false

# Lua plugins: embedded scripts as content preparers (no compiled binary).
# Use scripts_dir for local .lua files, or plugins + default_github/ref to download by name from GitHub.
# In content_preparers use plugin: "lua:hello-world" to run the hello-world Lua script.
# lua:
#   scripts_dir: ./scripts   # local .lua files (e.g. scripts/hello-world.lua)
#   default_github: opentalon/lua-plugins   # one repo, one subdir per plugin (e.g. hello-world/hello-world.lua)
#   default_ref: master
#   plugins: [hello-world]   # download these by name; or per-plugin: - name: X; github: org/repo; ref: main

state:
  data_dir: ~/.opentalon
  # db selects the database backend. Defaults to sqlite (single-node).
  # For multi-pod / horizontal scaling use postgres and omit data_dir (or keep it for plugin data).
  # db:
  #   driver: sqlite    # "sqlite" (default) or "postgres"
  #   # dsn: postgres://user:pass@localhost:5432/opentalon?sslmode=require
  # session limits and optional summarization
  # session:
  #   max_messages: 50           # cap messages per conversation (0 = no cap)
  #   context_messages: 10       # send only last N messages to LLM (0 = all; default 0)
  #   max_idle_days: 30          # delete sessions not updated in N days (0 = don't prune)
  #   summarize_after_messages: 10   # run LLM summarization after N messages (0 = off; default off)
  #   max_messages_after_summary: 6  # keep this many messages after summarization
  #   summarize_prompt: "Summarize the following conversation in a short paragraph."  # any language
  #   summarize_update_prompt: "Update the given conversation summary with the following new exchange. Keep the result to a short paragraph."
  # Per-session deep debug capture: raw LLM-endpoint request/response bodies
  # captured only while a session has metadata[debug]=true (toggled via the
  # set_debug_mode action). The table stays empty otherwise.
  # debug:
  #   retention_days: 30         # days to keep ai_debug_events rows (default 30)
  #   retention_disabled: false  # set true to keep rows forever; overrides retention_days
  # Structured session_events log: always-on per-turn analytics trail
  # (turn_start, llm_response, tool_call_extracted, parse failures, ...).
  # See internal/state/store/events for the full payload schema.
  #
  # Current producer coverage: the OpenAI-compatible provider emits
  # llm_request / llm_response / llm_refused / llm_error at the HTTP
  # boundary. The Anthropic provider and the orchestrator-internal event
  # types (turn_start, tool_call_*, planner_*, summarization_*, ...) are
  # wired in subsequent phases; until then, sessions routed via Anthropic
  # models or driven through those orchestrator surfaces will be absent
  # from the corresponding event types.
  # session_events:
  #   retention_days: 90         # days to keep session_events rows (default 90)
  #   retention_disabled: false  # set true to keep rows forever; overrides retention_days

# Scheduler: periodic jobs and user-triggered reminders.
# The built-in scheduler tool lets the LLM create/list/delete jobs and set
# personal reminders ("remind me about X in 2h"). Jobs run plugin actions on
# a schedule; results are optionally delivered back to a channel.
# scheduler:
#   # Only users in this list may create/modify recurring (interval/cron) jobs.
#   # Personal one-shot reminders via remind_me bypass this gate.
#   # Omit or leave empty to allow anyone.
#   approvers: []
#   # Cap on dynamic jobs per user (0 = unlimited). Reminders count toward this.
#   max_jobs_per_user: 50
#   # Static jobs loaded on startup. These are immutable at runtime.
#   jobs:
#     # - name: nightly-report
#     #   cron: "0 0 * * *"
#     #   action: reports.generate
#     #   notify_channel: slack

# Log level: debug, info, warn, error. Env var LOG_LEVEL overrides this.
# All logs go to stderr (k8s-friendly). Debug includes LLM request/response details.
# Each session gets a trace_id for correlation in kubectl logs / Grafana.
log:
  level: info

# gRPC health probes (always enabled, used by Kubernetes liveness/readiness).
# health:
#   addr: ":8086"  # grpc.health.v1.Health service
